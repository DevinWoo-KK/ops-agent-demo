<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反洗钱审核Agent | 华峻捷科面试</title>
<style>
:root {
  --bg: #faf9f5; --text: #141413; --muted: #6b6b6b;
  --accent: #d97757; --card: #ffffff; --border: #e8e5df;
  --blue: #3b6fb6; --green: #3d9965; --red: #a71d2a; --yellow: #b8860b;
  --code-bg: #f3f1ed;
  --font-serif: 'Georgia', 'Times New Roman', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-sans); line-height:1.6; }
.container { max-width:900px; margin:0 auto; padding:30px 24px; }

.hero { padding:30px 0 20px; text-align:center; border-bottom:1px solid var(--border); margin-bottom:24px; }
.hero h1 { font-family:var(--font-serif); font-size:1.8rem; font-weight:700; color:var(--accent); margin-bottom:6px; }
.hero .sub { color:var(--muted); font-size:0.9rem; }

.bar { background:var(--code-bg); border-radius:6px; padding:12px 16px; margin-bottom:16px; font-family:var(--font-mono); font-size:0.78rem; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.bar .stat { text-align:center; }
.bar .stat .n { font-size:1.2rem; font-weight:600; }
.bar .stat .l { font-size:0.65rem; color:var(--muted); }

.card-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0; }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; }
.card h4 { font-family:var(--font-mono); font-size:0.85rem; color:var(--blue); margin-bottom:6px; }
.card .val { font-family:var(--font-mono); font-size:1.1rem; margin:4px 0; }
.card .unit { font-size:0.7rem; color:var(--muted); }
.card.red { border-left:3px solid var(--red); }
.card.green { border-left:3px solid var(--green); }
.card.yellow { border-left:3px solid var(--yellow); }

.progress-bar { display:flex; gap:4px; margin:8px 0; }
.progress-seg { flex:1; height:4px; background:var(--border); border-radius:2px; }
.progress-seg.done { background:var(--green); }

.step { margin-bottom:14px; border-left:2px solid var(--border); padding-left:14px; }
.step.active { border-left-color:var(--accent); }
.step-header { font-family:var(--font-mono); font-size:0.78rem; font-weight:600; margin-bottom:4px; color:var(--muted); }
.step.active .step-header { color:var(--accent); }
.step-content { font-size:0.82rem; color:#3a3a3a; }

.tx-table { width:100%; border-collapse:collapse; font-size:0.78rem; font-family:var(--font-mono); margin:8px 0; }
.tx-table th { background:var(--code-bg); padding:6px 10px; text-align:left; font-size:0.7rem; color:var(--muted); border-bottom:1px solid var(--border); }
.tx-table td { padding:6px 10px; border-bottom:1px solid var(--border); }

.alert-badge { padding:2px 8px; border-radius:0; font-size:0.7rem; font-weight:600; font-family:var(--font-mono); display:inline-block; }
.badge-red { background:#fde8e8; color:var(--red); }
.badge-green { background:#f2faf5; color:var(--green); }
.badge-yellow { background:#fef9f0; color:var(--yellow); }

.report { margin-top:20px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.report-header { background:var(--code-bg); padding:14px 18px; font-family:var(--font-mono); font-size:0.78rem; border-bottom:1px solid var(--border); }
.report-body { padding:18px; font-size:0.82rem; }

.btn-row { display:flex; gap:8px; margin-top:16px; }
.btn { padding:8px 20px; border:1px solid var(--text); background:transparent; color:var(--text); font-family:var(--font-mono); font-size:0.8rem; cursor:pointer; }
.btn:hover { background:var(--text); color:var(--bg); }
.btn.accent { border-color:var(--accent); color:var(--accent); }
.btn.accent:hover { background:var(--accent); color:#fff; }

.conclusion { padding:14px 18px; border-radius:8px; margin:12px 0; font-size:0.85rem; }
.conclusion.clean { background:#f2faf5; border:1px solid #c3e6cf; }
.conclusion.suspicious { background:#fef5f5; border:1px solid #f5c6c6; }
.conclusion.uncertain { background:#fef9f0; border:1px solid #ead4a2; }

.footer { text-align:center; padding:30px 0; color:var(--muted); font-size:0.75rem; border-top:1px solid var(--border); margin-top:40px; }

@media(max-width:600px){ .card-row { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">

<div class="hero">
  <h1>反洗钱智能审核 Agent</h1>
  <p class="sub">银行反洗钱 · 告警智能筛查 · 误报率降低 90%</p>
</div>

<!-- Stats bar -->
<div class="bar">
  <div class="stat"><div class="n">3,847</div><div class="l">今日告警</div></div>
  <div class="stat"><div class="n" style="color:var(--red);">99.2%</div><div class="l">历史误报率</div></div>
  <div class="stat"><div class="n" style="color:var(--green);">4.2min</div><div class="l">Agent 单笔耗时</div></div>
  <div class="stat"><div class="n" style="color:var(--green);">90%</div><div class="l">目标误报过滤率</div></div>
</div>

<!-- Demo body -->
<div id="demo-body"></div>

<div class="footer">
  反洗钱审核Agent Demo · 华峻捷科面试作品 · 2026
</div>

</div>

<script>
// ── Scenario ──
const scenario = {
  id: "AML-20260519-0047",
  alert: {
    time: "2026-05-19 14:22:08",
    source: "大额交易监控规则 #C17",
    rule: "单日累计现金存入 ≥ 48,000 元",
    threshold: "48,000",
    actual: "49,500",
  },
  subject: {
    name: "张某某",
    acctNo: "**** 3852",
    acctType: "个人储蓄账户",
    openDate: "2024-03-15",
    riskRating: "中低风险",
    occupation: "个体工商户（餐饮）",
    monthlyIncome: "15,000-25,000",
    historicalAlerts: 2,
    lastReviewResult: "正常（2025-11）",
  },
  transaction: {
    id: "TXN-8847291",
    type: "柜面现金存入",
    amount: 49500,
    branch: "广州天河支行",
    teller: "T8823",
    counterparty: "本人账户",
    purpose: "营业收入",
  },
  relatedTxs: [
    { date:"05-19 10:15", type:"柜面现金存入", amount:49000, branch:"广州天河支行", counterparty:"本人" },
    { date:"05-18 15:30", type:"柜面现金存入", amount:48000, branch:"广州越秀支行", counterparty:"本人" },
    { date:"05-17 09:45", type:"柜面现金存入", amount:51000, branch:"广州天河支行", counterparty:"本人" },
    { date:"05-16 14:20", type:"网银转账(转出)", amount:200000, branch:"—", counterparty:"李某（异地）" },
    { date:"05-16 11:00", type:"柜面现金存入", amount:47500, branch:"广州海珠支行", counterparty:"本人" },
  ],
  analysis: {
    rootCause: "客户连续5天在3个不同网点存入现金，每次金额刻意控制在5万元以下（略低于大额报告阈值50,000），累计25.5万元。同时有大额转出至异地个人账户。",
    evidence_problem: [
      "5天内5笔现金存入，金额集中在47,500-51,000，均低于50,000大额报告线——典型'拆分交易(structuring)'模式",
      "使用3个不同网点分散存入，刻意规避单一网点触发关注",
      "5月16日一次性转出20万至异地李某，资金快进快出",
      "月收入1.5-2.5万的餐饮店主，5天存入25.5万远超正常经营流水",
      "历史2次告警均被判定正常——可能是因为之前单笔分析未关联"
    ],
    evidence_ruled_out: [
      "柜面存入而非ATM/网银，排除账户被盗用",
      "账户为本人操作，排除第三方冒名",
      "营业时间为正常时段，排除深夜异常操作"
    ],
    impact: "疑似洗钱'处置阶段'——将大额现金拆分存入银行体系，再通过转账转移。若确认为洗钱，涉及上游犯罪资金。需在5个工作日内上报央行反洗钱监测中心。",
    recommendation: "①标记为'可疑'，建议提交央行大额可疑交易报告 ②冻结账户待进一步调查 ③调取李某账户关联交易记录 ④上报省级反洗钱中心",
    riskScore: 82,
    needsHuman: "是。判定为可疑后必须由合规官复核并决定是否上报央行。Agent 已完成证据整理，合规官只需确认。"
  }
};

let currentStep = 0;
let stepInterval = null;

function nextStep() { if (currentStep < 5) { currentStep++; renderAll(); } }
function autoPlay() {
  currentStep = 0; renderAll();
  stepInterval = setInterval(() => { if (currentStep < 5) { currentStep++; renderAll(); } else clearInterval(stepInterval); }, 900);
}
function resetAll() { currentStep = 0; if (stepInterval) clearInterval(stepInterval); renderAll(); }

function renderAll() {
  const s = scenario;
  let html = '';

  // ── Alert bar ──
  html += `<div class="bar">
    <span style="color:var(--muted);">告警:</span> <strong>${s.id}</strong>
    <span class="badge-red alert-badge">待审核</span>
    <span style="color:var(--muted);margin-left:auto;">${s.alert.time}</span>
  </div>`;

  // ── Subject + Transaction cards ──
  html += `<div class="card-row">
    <div class="card">
      <h4>客户信息</h4>
      <div class="val">${s.subject.name} · ${s.subject.acctNo}</div>
      <div class="unit">职业: ${s.subject.occupation} &nbsp;|&nbsp; 月收入: ${s.subject.monthlyIncome}</div>
      <div class="unit">风险评级: ${s.subject.riskRating} &nbsp;|&nbsp; 历史告警: ${s.subject.historicalAlerts}次</div>
    </div>
    <div class="card red">
      <h4>触发交易</h4>
      <div class="val" style="color:var(--red);">¥${s.transaction.amount.toLocaleString()}</div>
      <div class="unit">${s.transaction.type} · ${s.transaction.branch}</div>
      <div class="unit">触发规则: ${s.alert.rule}（实际 ${s.alert.actual} > 阈值 ${s.alert.threshold}）</div>
    </div>
  </div>`;

  // ── Progress ──
  html += `<div class="progress-bar">`;
  for (let i=1; i<=5; i++) html += `<div class="progress-seg ${i<=currentStep?'done':''}"></div>`;
  html += `</div>`;

  // ── Step 1: 关联交易调取 ──
  if (currentStep >= 1) {
    html += `<div class="step active">
      <div class="step-header">📡 Step 1: 关联交易调取</div>
      <div class="step-content">
        <p>Agent 自动调取该客户近 5 天全部交易记录，共 ${s.relatedTxs.length} 笔：</p>
        <table class="tx-table">
          <tr><th>时间</th><th>类型</th><th>金额</th><th>网点</th><th>对手</th></tr>
          ${s.relatedTxs.map(tx => `
            <tr>
              <td>${tx.date}</td>
              <td>${tx.type}</td>
              <td style="color:${tx.amount>48000?'var(--red)':'var(--text)'};font-weight:600;">¥${tx.amount.toLocaleString()}</td>
              <td>${tx.branch}</td>
              <td>${tx.counterparty}</td>
            </tr>
          `).join('')}
        </table>
      </div></div>`;
  }

  // ── Step 2: LLM 分析 ──
  if (currentStep >= 2) {
    html += `<div class="step active">
      <div class="step-header">🧠 Step 2: LLM 综合分析</div>
      <div class="step-content">
        <p><strong>分析结论:</strong> ${s.analysis.rootCause}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;">
          <div style="background:#fef5f5;border:1px solid #f5c6c6;border-radius:8px;padding:12px;">
            <p style="color:var(--red);font-weight:600;font-size:0.78rem;margin-bottom:6px;">▸ 可疑特征</p>
            <ul style="font-size:0.78rem;padding-left:16px;color:#3a3a3a;">
              ${s.analysis.evidence_problem.map(e=>`<li style="margin-bottom:3px;">${e}</li>`).join('')}
            </ul>
          </div>
          <div style="background:#f2faf5;border:1px solid #c3e6cf;border-radius:8px;padding:12px;">
            <p style="color:var(--green);font-weight:600;font-size:0.78rem;margin-bottom:6px;">▸ 已排除</p>
            <ul style="font-size:0.78rem;padding-left:16px;color:#3a3a3a;">
              ${s.analysis.evidence_ruled_out.map(e=>`<li style="margin-bottom:3px;">${e}</li>`).join('')}
            </ul>
          </div>
        </div>
        <p><strong>风险评估:</strong> ${s.analysis.impact}</p>
      </div></div>`;
  }

  // ── Step 3: 风险评分 ──
  if (currentStep >= 3) {
    const score = s.analysis.riskScore;
    const cls = score >= 80 ? 'suspicious' : (score >= 50 ? 'uncertain' : 'clean');
    const label = score >= 80 ? '⚠ 高度可疑' : (score >= 50 ? '⚡ 需关注' : '✓ 正常');
    const riskBarW = Math.min(score, 100);
    const riskColor = score >= 80 ? 'var(--red)' : (score >= 50 ? '#d9a845' : 'var(--green)');
    html += `<div class="step active">
      <div class="step-header">⚖️ Step 3: 风险评分</div>
      <div class="step-content">
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="font-size:2.5rem;font-weight:700;color:${riskColor};">${score}</div>
          <div style="flex:1;">
            <div style="font-weight:600;font-size:1rem;margin-bottom:4px;">${label}</div>
            <div style="height:8px;background:var(--border);border-radius:4px;">
              <div style="width:${riskBarW}%;height:100%;background:${riskColor};border-radius:4px;"></div>
            </div>
            <div style="font-size:0.7rem;color:var(--muted);margin-top:4px;">评分维度: 交易模式40% · 客户画像25% · 对手风险20% · 历史行为15%</div>
          </div>
        </div>
        <div class="conclusion ${cls}">
          <strong>判定: ${label}</strong><br>
          <span style="font-size:0.8rem;">建议: ${s.analysis.recommendation}</span>
        </div>
        <p><span class="badge-red alert-badge" style="font-size:0.8rem;padding:4px 12px;">需人工复核</span> &nbsp; ${s.analysis.needsHuman}</p>
      </div></div>`;
  }

  // ── Step 4: 审核报告 ──
  if (currentStep >= 4) {
    html += `<div class="step active">
      <div class="step-header">📋 Step 4: 生成审核报告</div>
      <div class="step-content"><p>结构化审核报告已生成 ↓</p></div></div>`;

    html += `<div class="report">
      <div class="report-header">反洗钱审核报告 · ${s.id}</div>
      <div class="report-body">
        <table class="tx-table">
          <tr><td style="color:var(--muted);">报告编号</td><td>${s.id}</td></tr>
          <tr><td style="color:var(--muted);">客户</td><td>${s.subject.name} · ${s.subject.acctNo}</td></tr>
          <tr><td style="color:var(--muted);">触发规则</td><td>${s.alert.rule}</td></tr>
          <tr><td style="color:var(--muted);">关联交易</td><td>${s.relatedTxs.length} 笔，累计 ¥${s.relatedTxs.reduce((sum,tx)=>sum+tx.amount,0).toLocaleString()}</td></tr>
          <tr><td style="color:var(--muted);">风险评分</td><td style="color:var(--red);font-weight:700;">${s.analysis.riskScore}/100 · 高度可疑</td></tr>
          <tr><td style="color:var(--muted);">分析结论</td><td>${s.analysis.rootCause}</td></tr>
          <tr><td style="color:var(--muted);">建议措施</td><td>${s.analysis.recommendation}</td></tr>
          <tr><td style="color:var(--muted);">合规官</td><td>___________（签字） &nbsp;&nbsp; 日期: ___________</td></tr>
        </table>
      </div></div>`;
  }

  // ── Step 5: 效率对比 ──
  if (currentStep >= 5) {
    html += `<div class="step active">
      <div class="step-header">📊 Step 5: 效率对比</div>
      <div class="step-content">
        <div class="card-row">
          <div class="card" style="text-align:center;">
            <h4>人工审核</h4>
            <div class="val">15-30 分钟/笔</div>
            <div class="unit">登录多个系统 · 手动关联交易 · 撰写报告</div>
          </div>
          <div class="card green" style="text-align:center;">
            <h4>Agent 辅助审核</h4>
            <div class="val" style="color:var(--green);">4.2 分钟/笔</div>
            <div class="unit">自动调取 · LLM分析 · 自动生成报告</div>
          </div>
        </div>
        <div style="font-size:0.82rem;color:var(--muted);margin-top:12px;text-align:center;">
          <strong>如果 3,847 条告警中 80% 由 Agent 初筛:</strong><br>
          人工只需复核 <span style="color:var(--red);">~770 条可疑案例</span>（减少 80% 工作量）<br>
          相当于节省 <span style="color:var(--green);">3.5 个全职合规人员</span>
        </div>
      </div></div>`;
  }

  // ── Controls ──
  html += `<div class="btn-row">
    <button class="btn" onclick="autoPlay()">▶ 自动演示</button>
    ${currentStep < 5 ? `<button class="btn accent" onclick="nextStep()">下一步 →</button>` : ''}
    <button class="btn" onclick="resetAll()" style="margin-left:auto;">↺ 重置</button>
  </div>`;

  document.getElementById('demo-body').innerHTML = html;
}

renderAll();
</script>
</body>
</html>
