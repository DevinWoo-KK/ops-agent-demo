<style>
:root {
  --bg: #faf9f5; --text: #141413; --muted: #6b6b6b;
  --accent: #d97757; --card: #ffffff; --border: #e8e5df;
  --blue: #3b6fb6; --green: #3d9965; --red: #a71d2a;
  --code-bg: #f3f1ed;
  --font-serif: 'Georgia', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-sans); line-height:1.6; }
.container { max-width:1000px; margin:0 auto; padding:24px; }

.hero { padding:24px 0 16px; text-align:center; border-bottom:1px solid var(--border); margin-bottom:20px; }
.hero h1 { font-family:var(--font-serif); font-size:1.6rem; font-weight:700; color:var(--accent); }
.hero .sub { color:var(--muted); font-size:0.85rem; }

/* ReAct trace */
.trace { margin:16px 0; }
.trace-block { margin-bottom:12px; padding:12px 16px; border-radius:8px; font-family:var(--font-mono); font-size:0.78rem; line-height:1.5; }
.trace-thought { background:#f2f4ff; border:1px solid #d0daf5; border-left:3px solid #6b8cff; }
.trace-action { background:#fef9f0; border:1px solid #ead4a2; border-left:3px solid #d9a845; }
.trace-observation { background:#f2faf5; border:1px solid #c3e6cf; border-left:3px solid var(--green); }
.trace-final { background:#fef5f5; border:1px solid #f5c6c6; border-left:3px solid var(--red); }
.trace-label { font-size:0.65rem; font-weight:700; letter-spacing:1px; margin-bottom:4px; }
.trace-thought .trace-label { color:#6b8cff; }
.trace-action .trace-label { color:#d9a845; }
.trace-observation .trace-label { color:var(--green); }
.trace-final .trace-label { color:var(--red); }
.trace-content { white-space:pre-wrap; }

/* Tool call detail */
.tool-call { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:10px 14px; margin:8px 0; font-size:0.75rem; }
.tool-call .fn { font-weight:700; color:var(--blue); margin-bottom:4px; }
.tool-call .params { color:var(--muted); font-size:0.72rem; }
.tool-call .result { margin-top:6px; padding:8px; background:var(--code-bg); border-radius:4px; font-size:0.72rem; max-height:200px; overflow-y:auto; }

.progress { display:flex; gap:3px; margin:8px 0; }
.progress .dot { width:8px; height:8px; border-radius:50%; background:var(--border); }
.progress .dot.done { background:var(--green); }
.progress .dot.current { background:var(--accent); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.btn-row { display:flex; gap:8px; margin-top:12px; }
.btn { padding:8px 20px; border:1px solid var(--text); background:transparent; color:var(--text); font-family:var(--font-mono); font-size:0.8rem; cursor:pointer; }
.btn:hover { background:var(--text); color:var(--bg); }
.btn.accent { border-color:var(--accent); color:var(--accent); }
.btn.accent:hover { background:var(--accent); color:#fff; }

.summary { margin-top:20px; padding:16px; border-radius:8px; }
.summary.high { background:#fef5f5; border:2px solid #f5c6c6; }
.summary .score { font-size:2rem; font-weight:700; color:var(--red); }
.summary .meta { font-size:0.8rem; color:var(--muted); margin-top:8px; }

.footer { text-align:center; padding:24px 0; color:var(--muted); font-size:0.75rem; border-top:1px solid var(--border); margin-top:30px; }
</style>
</head>

let currentStep = -1;

function renderTrace() {
  const root = document.getElementById('trace-root');
  let html = '';

  // Progress dots
  html += '<div class="progress">';
  for (let i = 0; i <= 6; i++) {
    let cls = '';
    if (i < currentStep) cls = 'done';
    else if (i === currentStep) cls = 'current';
    html += `<div class="dot ${cls}"></div>`;
  }
  html += '</div>';

  // Render steps up to currentStep
  for (let i = 0; i <= currentStep && i < traceSteps.length; i++) {
    const s = traceSteps[i];
    if (s.type === 'task') {
      html += `<div class="trace-block" style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--text);">
        <div class="trace-label" style="color:var(--text);">📋 ${s.label}</div>
        <div class="trace-content">${s.content}</div>
      </div>`;
    } else {
      const cls = `trace-${s.type}`;
      html += `<div class="trace-block ${cls}">
        <div class="trace-label">${s.type==='thought'?'💭':'🔧'} ${s.label}</div>
        <div class="trace-content">${s.content}</div>`;

      if (s.toolDetail) {
        const td = s.toolDetail;
        html += `<div class="tool-call">
          <div class="fn">${td.fn}</div>
          <div class="params">参数: ${JSON.stringify(td.params)}</div>
          <div class="result">${td.result}</div>
        </div>`;
      }

      html += '</div>';
    }
  }

  root.innerHTML = html;

  // Summary after final step
  document.getElementById('summary').innerHTML = currentStep >= traceSteps.length - 1 ? `
    <div class="summary high">
      <div class="score">⚠ 极高风险 · 87/100</div>
      <p style="margin-top:8px;">命中 3 条 AML 规则 &nbsp;|&nbsp; OFAC SDN 模糊命中(0.91) &nbsp;|&nbsp; 6账户资金闭环<br>
      建议: 立即冻结账户 + 上报央行SAR + 人工确认制裁名单身份</p>
      <div class="meta">历史案例匹配: SAR-2024-0872(相似度0.88) — 已确认洗钱</div>
    </div>
  ` : '';
}

  let i = 0;
  interval = setInterval(() => {
    if (i < traceSteps.length) { currentStep = i; renderTrace(); i++; }
    else { clearInterval(interval); interval = null; }
  }, 1000);
}
function reset() { currentStep = -1; if (interval) clearInterval(interval); renderTrace(); }

// Init
renderTrace();
document.getElementById('controls').innerHTML = `
  <div class="btn-row">
    <button class="btn" onclick="autoPlay()">▶ 自动演示 (ReAct 推理链)</button>
    <button class="btn accent" onclick="nextStep()">下一步 →</button>
    <button class="btn" onclick="reset()" style="margin-left:auto;">↺ 重置</button>
  </div>
`;
</script>
</body>
</html>
